<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rocket Money Lite</title>
  <link rel="stylesheet" href="style.css"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<main id="main">

  <div id="top-bar">
    <h1 id="page-title">Dashboard</h1>
    <button id="btn-add-subscription">Add Subscription</button>
  </div>

  <div id="metrics"></div>

  <div id="middle-row">

    <div id="subscription-table">
      <h2>All Subscriptions:</h2>
      <div id="subscription-table-scroll">
        <table>
          <thead>
            <tr>
              <th>Service</th>
              <th>Category</th>
              <th>Status</th>
              <th>Amount</th>
              <th>Next Renewal</th>
            </tr>
          </thead>
          <tbody id="subscription-table-body"></tbody>
        </table>
      </div>
    </div>

    <div id="calendar">
      <h2>CALENDAR</h2>
      <div id="calendar-grid"></div>
    </div>

  </div>

  <div id="bottom-row">

    <div id="spending-by-category">
      <h2>Spending by Category</h2>
      <div id="spending-chart"></div>
    </div>

    <div id="upcoming-renewals">
      <h2>Upcoming Renewals</h2>
      <div id="upcoming-renewals-list"></div>
    </div>

    <div id="payment-history">
      <h2>Payment History</h2>
      <div id="payment-history-list"></div>
    </div>

  </div>

</main>

<!-- JS FILES -->
<script src="js/app.js"></script>
<script src="js/chart.js"></script>
<script src="js/renewals.js"></script>
<script src="js/payments.js"></script>

</body>
</html>
